<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunken Chest Spawn Calculator</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #0a2540 0%, #103c5c 50%, #0d5c63 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        color: #e8f1f5;
    }

    .container {
        background: rgba(10, 30, 50, 0.85);
        border: 1px solid rgba(120, 200, 220, 0.25);
        border-radius: 16px;
        padding: 28px 24px;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
    }

    h1 {
        text-align: center;
        font-size: 1.35rem;
        margin-bottom: 4px;
        color: #ffd86b;
    }

    .subtitle {
        text-align: center;
        font-size: 0.8rem;
        color: #9fc4d4;
        margin-bottom: 22px;
    }

    .inputs {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
    }

    .input-group {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .input-group label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9fc4d4;
        margin-bottom: 6px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 8px;
        font-size: 1.3rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(120, 200, 220, 0.3);
        border-radius: 10px;
        color: #ffffff;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
    }

    .input-group input:focus {
        border-color: #ffd86b;
        background: rgba(255, 255, 255, 0.12);
    }

    /* hide number spinners */
    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    .input-group input[type=number] {
        -moz-appearance: textfield;
        appearance: textfield;
    }

    button {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: linear-gradient(135deg, #ffd86b, #e0a636);
        color: #2a1e05;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.2s;
    }

    button:hover {
        box-shadow: 0 4px 16px rgba(255, 216, 107, 0.35);
    }

    button:active {
        transform: scale(0.98);
    }

    .result {
        margin-top: 20px;
        padding: 18px 16px;
        border-radius: 12px;
        text-align: center;
        display: none;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .result.waiting {
        display: block;
        background: rgba(30, 90, 130, 0.4);
        border: 1px solid rgba(120, 200, 220, 0.35);
    }

    .result.active {
        display: block;
        background: rgba(40, 140, 90, 0.35);
        border: 1px solid rgba(110, 230, 160, 0.5);
    }

    .result.error {
        display: block;
        background: rgba(150, 50, 50, 0.35);
        border: 1px solid rgba(240, 120, 120, 0.5);
    }

    .result .big {
        font-size: 1.5rem;
        font-weight: 700;
        color: #ffd86b;
        margin: 6px 0;
    }

    .result.active .big {
        color: #7ef0a8;
    }

    .result .detail {
        font-size: 0.85rem;
        color: #b8d8e4;
        line-height: 1.6;
        margin-top: 8px;
    }

    .result .label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #9fc4d4;
    }

    .formula-note {
        margin-top: 18px;
        text-align: center;
        font-size: 0.72rem;
        color: #7ba4b5;
    }

    @media (max-width: 380px) {
        .inputs {
            flex-direction: column;
        }
        h1 {
            font-size: 1.15rem;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1>🪙 Sunken Chest Calculator</h1>
    <p class="subtitle">Enter the current server uptime</p>

    <div class="inputs">
        <div class="input-group">
            <label for="days">Days</label>
            <input type="number" id="days" min="0" value="0" inputmode="numeric">
        </div>
        <div class="input-group">
            <label for="hours">Hours</label>
            <input type="number" id="hours" min="0" value="0" inputmode="numeric">
        </div>
        <div class="input-group">
            <label for="minutes">Minutes</label>
            <input type="number" id="minutes" min="0" value="0" inputmode="numeric">
        </div>
    </div>

    <button onclick="calculate()">Calculate Next Spawn</button>

    <div class="result" id="result"></div>

    <p class="formula-note">Spawn formula: 60 + 70 × n minutes of server uptime<br>Each event lasts 10 minutes</p>
</div>

<script>
    function formatDHM(totalMinutes) {
        const d = Math.floor(totalMinutes / 1440);
        const h = Math.floor((totalMinutes % 1440) / 60);
        const m = totalMinutes % 60;
        return d + "D " + h + "H " + m + "M";
    }

    function formatWait(totalMinutes) {
        const d = Math.floor(totalMinutes / 1440);
        const h = Math.floor((totalMinutes % 1440) / 60);
        const m = totalMinutes % 60;
        let parts = [];
        if (d > 0) parts.push(d + (d === 1 ? " day" : " days"));
        if (h > 0) parts.push(h + (h === 1 ? " hour" : " hours"));
        if (m > 0 || parts.length === 0) parts.push(m + (m === 1 ? " minute" : " minutes"));
        return parts.join(" ");
    }

    function calculate() {
        const days = parseInt(document.getElementById("days").value) || 0;
        const hours = parseInt(document.getElementById("hours").value) || 0;
        const minutes = parseInt(document.getElementById("minutes").value) || 0;
        const result = document.getElementById("result");

        if (days < 0 || hours < 0 || minutes < 0) {
            result.className = "result error";
            result.innerHTML = '<span class="label">Error</span><div class="big">Invalid input</div><div class="detail">Values cannot be negative.</div>';
            return;
        }

        const uptime = days * 1440 + hours * 60 + minutes;

        // Spawn times: 60 + 70n, for n >= 0
        if (uptime < 60) {
            const wait = 60 - uptime;
            result.className = "result waiting";
            result.innerHTML =
                '<span class="label">Next spawn in</span>' +
                '<div class="big">⏳ ' + formatWait(wait) + '</div>' +
                '<div class="detail">First chest (n = 0) spawns at <strong>0D 1H 0M</strong><br>Active until 0D 1H 10M</div>';
            return;
        }

        // Which cycle are we in?
        const n = Math.floor((uptime - 60) / 70);
        const currentSpawn = 60 + 70 * n;

        // Is a chest currently active? (spawn <= uptime < spawn + 10)
        if (uptime < currentSpawn + 10) {
            const remaining = currentSpawn + 10 - uptime;
            const nextSpawn = currentSpawn + 70;
            result.className = "result active";
            result.innerHTML =
                '<span class="label">Chest is active right now!</span>' +
                '<div class="big">🎉 Open it now!</div>' +
                '<div class="detail">Spawned at <strong>' + formatDHM(currentSpawn) + '</strong> (n = ' + n + ')<br>' +
                'Despawns in <strong>' + formatWait(remaining) + '</strong> (at ' + formatDHM(currentSpawn + 10) + ')<br>' +
                'Next spawn: ' + formatDHM(nextSpawn) + ' — in ' + formatWait(nextSpawn - uptime) + '</div>';
            return;
        }

        // Otherwise, wait for the next spawn
        const nextN = n + 1;
        const nextSpawn = 60 + 70 * nextN;
        const wait = nextSpawn - uptime;

        result.className = "result waiting";
        result.innerHTML =
            '<span class="label">Next spawn in</span>' +
            '<div class="big">⏳ ' + formatWait(wait) + '</div>' +
            '<div class="detail">Next chest (n = ' + nextN + ') spawns at <strong>' + formatDHM(nextSpawn) + '</strong><br>' +
            'Active until ' + formatDHM(nextSpawn + 10) + '<br>' +
            'You missed the last one (n = ' + n + ') by ' + formatWait(uptime - (currentSpawn + 10)) + '</div>';
    }

    // Allow Enter key to trigger calculation
    document.querySelectorAll("input").forEach(input => {
        input.addEventListener("keydown", e => {
            if (e.key === "Enter") calculate();
        });
    });
</script>
</body>
</html>
